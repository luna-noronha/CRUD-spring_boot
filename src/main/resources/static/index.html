<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="form-container">
    <h1>Cadastro de Usuário</h1>

    <form id="userForm">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Digite seu nome" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail" required>

        <div class="buttons">
            <button type="button" onclick="criar()">Criar</button>
            <button type="button" class="warning" onclick="atualizar()">Atualizar</button>
            <button type="button" class="danger" onclick="deletar()">Deletar</button>
            <button type="button" class="info" onclick="buscar()">Buscar</button>
        </div>
    </form>

    <pre id="resultadoBuscar"></pre>
</div>

<div id="toast-container"></div>

<script>
    const api = "/usuario";

    function showToast(message, type = "info") {
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.getElementById("toast-container").appendChild(toast);

      setTimeout(() => toast.classList.add("show"), 100);
      setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    async function criar() {
      const resp = await fetch(api, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          nome: document.getElementById("nome").value,
          email: document.getElementById("email").value
        })
      });
      showToast(resp.ok ? "Usuário criado com sucesso!" : "Erro ao criar!", resp.ok ? "success" : "error");
    }

    async function buscar() {
      const email = document.getElementById("email").value;
      const resp = await fetch(`${api}?email=${encodeURIComponent(email)}`);
      if (resp.ok) {
        const data = await resp.json();
        document.getElementById("resultadoBuscar").innerText = JSON.stringify(data, null, 2);
        showToast("Usuário encontrado!", "success");
      } else {
        document.getElementById("resultadoBuscar").innerText = "Usuário não encontrado!";
        showToast("Usuário não encontrado!", "error");
      }
    }

    async function deletar() {
      const email = document.getElementById("email").value;
      const resp = await fetch(`${api}?email=${encodeURIComponent(email)}`, { method: "DELETE" });
      showToast(resp.ok ? "Usuário deletado!" : "Erro ao deletar!", resp.ok ? "success" : "error");
    }

    async function atualizar() {
      const resp = await fetch(`${api}?id=1`, { /* ID fixo como exemplo */
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          nome: document.getElementById("nome").value,
          email: document.getElementById("email").value
        })
      });
      showToast(resp.ok ? "Usuário atualizado!" : "Erro ao atualizar!", resp.ok ? "success" : "error");
    }
</script>
</body>
</html>
